<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>𝐂𝐘𝐁𝐄𝐑 𝐍𝐀𝐈𝐋</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com""")/>>
  <link href="https://fonts.googleapis.com" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Poppins', sans-serif;
      background: #010409;
      color: #fff;
      overflow: hidden;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* حباب‌های نئونی با درخشش بیشتر */
    .neon-bubbles {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      z-index: 0;
      pointer-events: none;
    }
    .neon-bubbles span {
      position: absolute;
      border-radius: 50%;
      animation: rise 7s linear infinite;
      filter: blur(2px);
      box-shadow: 0 0 15px currentColor;
    }
    @keyframes rise {
      0% { transform: translateY(110vh) scale(0.5); opacity: 0; }
      50% { opacity: 0.6; }
      100% { transform: translateY(-10vh) scale(1.2); opacity: 0; }
    }

    .box {
      position: relative;
      background: rgba(13, 17, 23, 0.8);
      backdrop-filter: blur(15px);
      padding: 40px 30px;
      border-radius: 25px;
      text-align: center;
      width: 380px;
      z-index: 10;
      border: 1px solid rgba(0, 242, 255, 0.2);
      box-shadow: 0 0 30px rgba(0, 242, 255, 0.1);
      overflow: hidden;
    }

    /* خط نئونی چرخان دور باکس */
    .box::before {
      content: '';
      position: absolute;
      top: -50%; left: -50%;
      width: 200%; height: 200%;
      background: conic-gradient(transparent, transparent, transparent, #00f2ff);
      animation: rotate-border 4s linear infinite;
      z-index: -1;
    }
    .box::after {
      content: '';
      position: absolute;
      inset: 2px;
      background: #0d1117;
      border-radius: 23px;
      z-index: -1;
    }
    @keyframes rotate-border {
      100% { transform: rotate(360deg); }
    }

    h3 {
      font-family: 'Orbitron', sans-serif;
      color: #00f2ff;
      letter-spacing: 2px;
      margin: 15px 0 5px;
      text-shadow: 0 0 10px rgba(0, 242, 255, 0.5);
    }

    h6 { color: rgba(255,255,255,0.6); font-weight: 300; margin-bottom: 20px; }

    .input-container {
      margin-top: 20px;
      display: flex;
      background: rgba(255,255,255,0.05);
      border-radius: 12px;
      padding: 5px;
      border: 1px solid rgba(255,255,255,0.1);
    }
    .input-container input {
      flex: 1;
      padding: 12px;
      border: none;
      outline: none;
      background: transparent;
      color: #fff;
      font-size: 16px;
    }
    .input-container button {
      padding: 10px 20px;
      border: none;
      border-radius: 10px;
      background: #00f2ff;
      color: #000;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
    }
    .input-container button:hover {
      box-shadow: 0 0 15px #00f2ff;
      transform: scale(1.05);
    }

    #pair { margin-top: 25px; min-height: 40px; }

    .info-container {
      margin-top: 30px;
      padding-top: 20px;
      border-top: 1px solid rgba(255,255,255,0.1);
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 15px;
      color: #00f2ff;
      font-family: 'Orbitron', sans-serif;
      font-size: 14px;
    }

    .info-item i { animation: pulse 2s infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

    #copy {
      background: rgba(0, 242, 255, 0.1);
      padding: 15px;
      border-radius: 12px;
      border: 1px dashed #00f2ff;
      cursor: pointer;
      display: block;
    }
  </style>
</head>
<body>
  <div class="neon-bubbles" id="neon-bubbles"></div>

  <div class="box">
    <i class="fa-solid fa-microchip" style="font-size: 40px; color: #00f2ff;"></i>
    <h3>CYBER NAIL</h3>
    <h6>PREMIUM PAIRING SYSTEM</h6>
    
    <div class="input-container">
      <input placeholder="9470604xxxx" type="number" id="number">
      <button id="submit">LINK</button>
    </div>

    <div id="pair"></div>

    <div class="info-container">
      <div class="info-item">
        <i class="fas fa-clock"></i> <span id="uptime">00:00:00</span>
      </div>
    </div>
  </div>

  <script>
    // حباب‌های رنگی نسخه اصلی تو با افکت زیباتر
    const container = document.getElementById("neon-bubbles");
    for (let i = 0; i < 30; i++) {
      const bubble = document.createElement("span");
      const size = Math.random() * 10 + 5 + "px";
      bubble.style.width = size;
      bubble.style.height = size;
      bubble.style.left = Math.random() * 100 + "vw";
      bubble.style.animationDuration = 5 + Math.random() * 5 + "s";
      bubble.style.animationDelay = Math.random() * 5 + "s";
      const colors = ['#00f2ff', '#0077ff', '#7000ff'];
      bubble.style.color = colors[Math.floor(Math.random() * colors.length)];
      bubble.style.background = bubble.style.color;
      container.appendChild(bubble);
    }

    // ساعت زنده
    function updateTime() {
      document.getElementById("uptime").textContent = new Date().toLocaleTimeString();
    }
    setInterval(updateTime, 1000);
    updateTime();

    // همان کدی که خودت داشتی با کمی تمیزکاری
    let a = document.getElementById("pair");
    let b = document.getElementById("submit");
    let c = document.getElementById("number");

    async function Copy() {
      let obj = document.getElementById("copy-val");
      await navigator.clipboard.writeText(obj.innerText);
      const originalText = a.innerHTML;
      a.innerHTML = '<b style="color:#00ff88">✓ COPIED</b>';
      setTimeout(() => { a.innerHTML = originalText; }, 1000);
    }

    b.addEventListener("click", async (e) => {
      e.preventDefault();
      if (!c.value) {
        a.innerHTML = '<small style="color:#ff4d4d">Enter number with code</small>';
      } else {
        const number = c.value.replace(/[^0-9]/g, "");
        a.innerHTML = '<i class="fas fa-circle-notch fa-spin"></i>';
        try {
          let res = await fetch(`/code?number=${number}`);
          let data = await res.json();
          let code = data.code || "FAIL";
          a.innerHTML = `<div id="copy" onclick="Copy()">
            <span style="font-size:10px; opacity:0.6; display:block">CLICK TO COPY</span>
            <span id="copy-val" style="font-size:22px; font-weight:bold; letter-spacing:4px;">${code}</span>
          </div>`;
        } catch (err) {
          a.innerHTML = '<small style="color:#ff4d4d">Server Error</small>';
        }
      }
    });
  </script>
</body>
</html>
